body {

  color: #f2efe9;
  font-family: 'Inter', sans-serif;
  min-height: 100svh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  -webkit-font-smoothing: antialiased;
}

.container {
  width: 100%;
  max-width: 340px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

.profile {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  text-align: center;
}

.logo-wrap {
  width: 56px; height: 56px;
  display: flex; align-items: center; justify-content: center;
}

.logo-wrap img {
  width: 100%; height: 100%;
  object-fit: contain;
  filter: brightness(0) invert(1);
  opacity: 0.75;
}

.profile-name {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  letter-spacing: -0.01em;
  color: #f2efe9;
}

.profile-role {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #4a4a46;
  margin-top: -6px;
}

.divider {
  width: 100%;
  height: 0.5px;
  background: rgba(255,255,255,0.06);
}

.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.link-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 15px 20px;
  border-radius: 2px;
  text-decoration: none;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  transition: opacity .2s, border-color .2s, color .2s;
}

.link-btn:hover { opacity: 0.8; }

.link-primary {
  background: #f2efe9;
  color: #0a0a0a;
}

.link-outline {
  background: transparent;
  color: #4a4a46;
  border: 0.5px solid rgba(255,255,255,0.1);
}

.link-outline:hover {
  color: #f2efe9;
  border-color: rgba(255,255,255,0.28);
  opacity: 1;
}

.star {
  font-size: 14px;
  color: rgba(255,255,255,0.08);
}
